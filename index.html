<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Review</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:350px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fade 0.5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:10px;
color:#25D366;
}

.desc{
text-align:center;
font-size:14px;
color:gray;
margin-bottom:25px;
line-height:1.5;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
background:#f2f2f2;
border-radius:12px;
font-size:16px;
outline:none;
color:black;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#25D366;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:5px;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.wa-btn{
background:#128C7E;
margin-top:15px;
}

.pair-btn{
background:#203a43;
margin-top:15px;
}

.tele-btn{
background:#0088cc;
margin-top:15px;
}

.note{
margin-top:15px;
text-align:center;
font-size:12px;
color:gray;
}

#toast{
visibility:hidden;
min-width:220px;
background:#25D366;
color:white;
text-align:center;
padding:15px;
border-radius:12px;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

#toast.show{
visibility:visible;
}
</style>
</head>

<body>

<div id="toast">
Pairing berhasil dibuka
</div>

<!-- LOGIN -->
<div id="loginPage" class="card">

<div class="logo">WhatsApp</div>

<div class="desc">
Login untuk masuk ke halaman review akun WhatsApp.
</div>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<button onclick="chatBantuan()" class="wa-btn">
Bantuan Chat
</button>

<button onclick="showToast()" class="pair-btn">
Pairing
</button>

<button onclick="bukaTele()" class="tele-btn">
Telegram
</button>

</div>

<!-- HALAMAN REVIEW -->
<div id="mainPage" class="card" style="display:none;">

<div class="logo">WhatsApp Review</div>

<div class="desc">
Ajukan peninjauan akun WhatsApp yang terkena banned permanen.
</div>

<input type="text" id="nomor" placeholder="+62xxxxxxxxxx">

<button onclick="kirimEmail()">Lanjut</button>

<div class="note">
Gunakan WhatsApp resmi agar akun lebih aman.
</div>

</div>

<script>

function login(){

const user = document.getElementById("username").value;
const pass = document.getElementById("password").value;

if(user === "revan" && pass === "XYL2"){

document.getElementById("loginPage").style.display = "none";
document.getElementById("mainPage").style.display = "block";

}else{
alert("Username atau password salah");
}

}

function chatBantuan(){

window.location.href =
"https://api.whatsapp.com/send?phone=6283186636882&text=Halo%20saya%20butuh%20bantuan";

}

function bukaTele(){

window.location.href =
"https://t.me/usernamekamu";

}

function showToast(){

const toast = document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);

}

function kirimEmail(){

const nomor = document.getElementById("nomor").value.trim();

if(!nomor){
alert("Masukkan nomor terlebih dahulu");
return;
}

const subject =
encodeURIComponent("Permintaan Tinjau Akun WhatsApp");

const body = encodeURIComponent(
`Halo Tim WhatsApp,

Saya ingin mengajukan peninjauan akun WhatsApp saya yang terkena banned permanen. Saya merasa mungkin terjadi kesalahan atau pelanggaran yang tidak saya sadari.

Nomor saya: ${nomor}

Saya berjanji akan mengikuti kebijakan dan ketentuan WhatsApp ke depannya. Mohon bantuannya untuk meninjau kembali akun saya.

Terima kasih`
);

window.location.href =
`mailto:support@support.whatsapp.com?subject=${subject}&body=${body}`;

}

</script>

</body>
</html>
